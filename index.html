<body>
  <main class="app">
    <header><div class="title-block"><h1>The Boys<br>Routine Tracker</h1><p id="todayLabel">Today</p></div><button class="pill" id="themeButton" type="button">🦖 Dinos</button></header>

<script>
const STORAGE_KEY="boysRoutineRewards.v3";
const CLOUD_WEB_APP_URL="";
const PARENT_NAME="Parent";
const THEMES={dino:{label:"🦖 Dinos",icons:["🦖","🦕","🥚","🌋","🦴","⭐"],bg:"radial-gradient(circle at top,#fff3a6 0,#fff8dc 42%,#e0f2fe 100%)"},truck:{label:"🚚 Trucks",icons:["🚚","🚛","🚜","🛻","🏁","⭐"],bg:"radial-gradient(circle at top,#dbeafe 0,#eef6ff 44%,#fef3c7 100%)"},creature:{label:"⭐ Badges",icons:["⭐","⚡","🔥","💧","🌿","🏆"],bg:"radial-gradient(circle at top,#ede9fe 0,#fff7ed 45%,#dbeafe 100%)"}};

const ROUTINES={Zach:[{id:"morning",title:"Morning Power-Up",subtitle:"Potty, teeth, clothes",iconIndex:0,script:"First potty, then teeth, then clothes. Then you earn your Morning Power-Up.",steps:[{id:"potty",label:"Potty",points:1},{id:"teeth",label:"Brush teeth",points:1},{id:"clothes",label:"Clothes on",points:1}],bonus:2},{id:"blastoff",title:"Blast-Off",subtitle:"Potty, shoes, leave",iconIndex:1,script:"Blast-off time. First potty, then shoes, then car.",steps:[{id:"potty",label:"Potty before leaving",points:2},{id:"ready",label:"Shoes / jacket",points:1},{id:"leave",label:"Walk to car / leave",points:1}],bonus:1},{id:"food",title:"Food Time",subtitle:"Clean hands, then food",iconIndex:2,script:"Clean hands, then food.",steps:[{id:"sink",label:"Go to sink",points:1},{id:"wash",label:"Wash hands",points:1},{id:"table",label:"Come to table",points:1}],bonus:0},{id:"bedtime",title:"Night Power-Down",subtitle:"Potty, teeth, PJs, bed",iconIndex:3,script:"Night Power-Down: potty, teeth, pajamas, bed.",steps:[{id:"potty",label:"Potty",points:1},{id:"teeth",label:"Brush teeth",points:1},{id:"pjs",label:"Pajamas on",points:1},{id:"bed",label:"Into bed",points:1}],bonus:2},{id:"safeBody",title:"Safe Body",subtitle:"Mad but safe",iconIndex:4,script:"Safe body first. Hands and toys stay safe.",steps:[{id:"hands",label:"Safe hands",points:2},{id:"toys",label:"No throwing",points:2},{id:"calm",label:"Used calm-down tool",points:1}],bonus:0},{id:"repair",title:"Repair Point",subtitle:"Fix after a hard moment",iconIndex:5,script:"We repair, then we move on.",steps:[{id:"pickup",label:"Picked up toy",points:1},{id:"check",label:"Checked on person",points:1},{id:"gentle",label:"Gentle hands",points:1},{id:"fix",label:"Helped fix it",points:1}],bonus:0}],Joseph:[{id:"morningReady",title:"Morning Ready",subtitle:"Got ready without distracting",iconIndex:0,script:"Your job is Big Kid Ready: get yourself ready and let Zach work on his routine.",steps:[{id:"ready",label:"Got ready in the morning",points:1}],bonus:0},{id:"leaveReady",title:"Leaving Ready",subtitle:"Left calmly",iconIndex:1,script:"Your job is to get ready to leave calmly.",steps:[{id:"leave",label:"Got ready to leave calmly",points:1}],bonus:0},{id:"giveSpace",title:"Give Space",subtitle:"Space, not bossing",iconIndex:2,script:"Your job is space, not bossing. Let Zach work.",steps:[{id:"space",label:"Gave Zach space when asked",points:1}],bonus:0},{id:"brotherHelper",title:"Brother Helper",subtitle:"Helped calmly when asked",iconIndex:3,script:"Help only when asked. Calm helping earns.",steps:[{id:"help",label:"Helped Zach calmly when asked",points:1}],bonus:0},{id:"bedtimeReady",title:"Bedtime Ready",subtitle:"Completed bedtime",iconIndex:4,script:"Big Kid bedtime: finish your routine calmly.",steps:[{id:"bed",label:"Completed bedtime routine",points:1}],bonus:0},{id:"kindBody",title:"Kind and Safe",subtitle:"Kind words, safe body",iconIndex:5,script:"Kind words and safe body with your brother.",steps:[{id:"kind",label:"Used kind words and safe body",points:1}],bonus:0}]};
const defaultState={date:todayKey(),activeChild:"Zach",children:{Zach:{points:0,log:[],theme:CHILDREN.Zach.theme,rewards:CHILDREN.Zach.rewards},Joseph:{points:0,log:[],theme:CHILDREN.Joseph.theme,rewards:CHILDREN.Joseph.rewards}}};
let state=loadState(),activeRoutine=null,activeStepIds=new Set(),ignoreCloudUntil=0;
const $=id=>document.getElementById(id);const els={todayLabel:$("todayLabel"),score:$("score"),scoreLabel:$("scoreLabel"),scoreCard:$("scoreCard"),nextReward:$("nextReward"),progressBar:$("progressBar"),routineGrid:$("routineGrid"),logTitle:$("logTitle"),logList:$("logList"),themeButton:$("themeButton"),routineModal:$("routineModal"),modalIcon:$("modalIcon"),modalRoutineTitle:$("modalRoutineTitle"),scriptBox:$("scriptBox"),stepsList:$("stepsList"),closeRoutine:$("closeRoutine"),completeRoutine:$("completeRoutine"),safeBonus:$("safeBonus"),addCustom:$("addCustom"),undoPoint:$("undoPoint"),resetDay:$("resetDay"),settingsButton:$("settingsButton"),settingsModal:$("settingsModal"),settingsTitle:$("settingsTitle"),settingsHint:$("settingsHint"),closeSettings:$("closeSettings"),themeSelect:$("themeSelect"),rewardPts1:$("rewardPts1"),rewardPts2:$("rewardPts2"),rewardPts3:$("rewardPts3"),rewardPts4:$("rewardPts4"),reward1:$("reward1"),reward2:$("reward2"),reward3:$("reward3"),reward4:$("reward4"),saveSettings:$("saveSettings")};
init();
function init(){rolloverIfNeeded();bindEvents();render();syncFromCloud();setInterval(syncFromCloud,30000);document.addEventListener("visibilitychange",()=>{if(!document.hidden)syncFromCloud()})}
function bindEvents(){document.querySelectorAll(".child-btn").forEach(b=>b.addEventListener("click",()=>{state.activeChild=b.dataset.child;saveState();render();syncFromCloud()}));els.closeRoutine.addEventListener("click",closeRoutineModal);els.routineModal.addEventListener("click",e=>{if(e.target===els.routineModal)closeRoutineModal()});els.completeRoutine.addEventListener("click",completeActiveRoutine);els.safeBonus.addEventListener("click",()=>{addPoints(2,"Safe body bonus");els.safeBonus.textContent="✓ Safe Body Added";els.safeBonus.disabled=true});els.addCustom.addEventListener("click",()=>addPoints(1,"Custom point"));els.undoPoint.addEventListener("click",undoLast);els.resetDay.addEventListener("click",resetToday);els.settingsButton.addEventListener("click",openSettings);els.closeSettings.addEventListener("click",closeSettings);els.settingsModal.addEventListener("click",e=>{if(e.target===els.settingsModal)closeSettings()});els.saveSettings.addEventListener("click",saveSettings);els.themeButton.addEventListener("click",cycleTheme)}
function childState(child=state.activeChild){return state.children[child]}function childTheme(child=state.activeChild){return childState(child).theme||CHILDREN[child].theme||"dino"}function childRewards(child=state.activeChild){return childState(child).rewards||CHILDREN[child].rewards}function activeTheme(){return THEMES[childTheme()]||THEMES.dino}
function render(){const theme=activeTheme();document.body.style.background=theme.bg;els.themeButton.textContent=theme.label;els.todayLabel.textContent=formatToday();document.querySelectorAll(".child-btn").forEach(b=>b.classList.toggle("active",b.dataset.child===state.activeChild));const cs=childState();els.score.textContent=cs.points;els.scoreLabel.textContent=`${state.activeChild}’s ${CHILDREN[state.activeChild].token}`;els.logTitle.textContent=`${state.activeChild}’s log`;els.scoreCard.setAttribute("data-icon",state.activeChild==="Joseph"?"🏆":"🦖");const next=getNextReward();if(next){els.nextReward.textContent=`${next.points}: ${next.label}`;const prev=getPreviousTier(next.points),range=Math.max(1,next.points-prev),earned=Math.max(0,cs.points-prev);els.progressBar.style.width=`${Math.min(100,earned/range*100)}%`}else{els.nextReward.textContent="All rewards earned";els.progressBar.style.width="100%"}renderRoutines(theme);renderLog()}
function renderRoutines(theme){els.routineGrid.innerHTML="";(ROUTINES[state.activeChild]||[]).forEach(r=>{const total=r.steps.reduce((s,x)=>s+x.points,0)+r.bonus;const btn=document.createElement("button");btn.className="routine-btn";btn.type="button";btn.innerHTML=`<div class="routine-icon">${theme.icons[r.iconIndex]||"⭐"}</div><div><div class="routine-title">${r.title}</div><div class="routine-subtitle">${r.subtitle}</div></div><div class="routine-points">+${total}</div>`;btn.addEventListener("click",()=>openRoutine(r.id));els.routineGrid.appendChild(btn)})}
function renderLog(){const log=childState().log||[];els.logList.innerHTML="";if(!log.length){els.logList.innerHTML=`<div class="empty-log">No points yet today.</div>`;return}[...log].reverse().forEach(entry=>{const item=document.createElement("div");item.className="log-item";item.innerHTML=`<span>${entry.label}</span><span>+${entry.points} · ${entry.time}</span>`;els.logList.appendChild(item)})}
function openRoutine(id){activeRoutine=(ROUTINES[state.activeChild]||[]).find(r=>r.id===id);activeStepIds=new Set();if(!activeRoutine)return;const theme=activeTheme();els.safeBonus.textContent="+ Safe Body";els.safeBonus.disabled=false;els.safeBonus.style.display=state.activeChild==="Zach"?"block":"none";els.modalIcon.textContent=theme.icons[activeRoutine.iconIndex]||"⭐";els.modalRoutineTitle.textContent=activeRoutine.title;els.scriptBox.textContent=activeRoutine.script;renderSteps();els.routineModal.classList.add("open")}
function renderSteps(){els.stepsList.innerHTML="";activeRoutine.steps.forEach(step=>{const done=activeStepIds.has(step.id);const btn=document.createElement("button");btn.type="button";btn.className=`step-btn ${done?"done":""}`;btn.innerHTML=`<span class="step-name"><span class="check">${done?"✓":""}</span>${step.label}</span><span>+${step.points}</span>`;btn.addEventListener("click",()=>toggleStep(step.id));els.stepsList.appendChild(btn)})}
function toggleStep(stepId){activeStepIds.has(stepId)?activeStepIds.delete(stepId):activeStepIds.add(stepId);renderSteps()}
function completeActiveRoutine(){if(!activeRoutine)return;const selected=activeRoutine.steps.filter(s=>activeStepIds.has(s.id));const stepPoints=selected.reduce((sum,s)=>sum+s.points,0);const all=selected.length===activeRoutine.steps.length;const total=stepPoints+(all?activeRoutine.bonus:0);if(total<=0){closeRoutineModal();return}const label=all?`${activeRoutine.title} complete`:`${activeRoutine.title}: ${selected.map(s=>s.label).join(", ")}`;addPoints(total,label,activeRoutine.title);closeRoutineModal()}
function closeRoutineModal(){els.routineModal.classList.remove("open");activeRoutine=null;activeStepIds=new Set()}
function addPoints(points,label,routine=""){rolloverIfNeeded();const cs=childState();cs.points+=points;cs.log.push({points,label,time:new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})});saveState();render();ignoreCloudUntil=Date.now()+12000;cloudRequest("add",{child:state.activeChild,points,label,routine,parent:PARENT_NAME,tokenType:CHILDREN[state.activeChild].token}).then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)}).catch(()=>{})}
function undoLast(){const cs=childState();if(!cs.log.length)return;const last=cs.log.pop();cs.points=Math.max(0,cs.points-last.points);saveState();render();ignoreCloudUntil=Date.now()+12000;cloudRequest("undo",{child:state.activeChild,parent:PARENT_NAME}).then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)}).catch(()=>{})}
function resetToday(){if(!confirm(`Reset today's points for ${state.activeChild}?`))return;const cs=childState();cs.points=0;cs.log=[];state.date=todayKey();saveState();render();ignoreCloudUntil=Date.now()+12000;cloudRequest("reset",{child:state.activeChild,parent:PARENT_NAME}).then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)}).catch(()=>{})}
function openSettings(){const rewards=childRewards();els.settingsTitle.textContent=`${state.activeChild} Settings`;els.settingsHint.textContent=`These settings only affect ${state.activeChild}.`;els.themeSelect.value=childTheme();[0,1,2,3].forEach(i=>{els[`rewardPts${i+1}`].value=rewards[i]?.points||"";els[`reward${i+1}`].value=rewards[i]?.label||""});els.settingsModal.classList.add("open")}function closeSettings(){els.settingsModal.classList.remove("open")}
function saveSettings(){childState().theme=els.themeSelect.value;const fallback=CHILDREN[state.activeChild].rewards;const raw=[0,1,2,3].map(i=>({points:Number(els[`rewardPts${i+1}`].value||fallback[i].points),label:(els[`reward${i+1}`].value||fallback[i].label).trim()})).filter(r=>r.points>0&&r.label);raw.sort((a,b)=>a.points-b.points);childState().rewards=raw.length?raw:fallback;saveState();cloudRequest("settings",{child:state.activeChild,theme:childState().theme,rewards:JSON.stringify(childState().rewards),parent:PARENT_NAME}).then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)}).catch(()=>{});closeSettings();render()}
function cycleTheme(){const keys=Object.keys(THEMES),i=keys.indexOf(childTheme());childState().theme=keys[(i+1)%keys.length];saveState();render();cloudRequest("settings",{child:state.activeChild,theme:childState().theme,rewards:JSON.stringify(childRewards()),parent:PARENT_NAME}).then(cloud=>{ignoreCloudUntil=0;applyCloudState(cloud)}).catch(()=>{})}
function syncFromCloud(){if(!CLOUD_WEB_APP_URL)return Promise.resolve(null);if(Date.now()<ignoreCloudUntil)return Promise.resolve(null);return cloudRequest("state",{child:state.activeChild}).then(applyCloudState).catch(()=>null)}
function applyCloudState(cloud){if(!cloud||!cloud.ok)return;if(Date.now()<ignoreCloudUntil)return;state.date=cloud.date||todayKey();if(cloud.children){Object.keys(cloud.children).forEach(child=>{if(state.children[child]){state.children[child].points=Number(cloud.children[child].points||0);state.children[child].log=Array.isArray(cloud.children[child].log)?cloud.children[child].log:[];if(cloud.children[child].theme&&THEMES[cloud.children[child].theme])state.children[child].theme=cloud.children[child].theme;else if(cloud.theme&&THEMES[cloud.theme]&&!state.children[child].theme)state.children[child].theme=cloud.theme;if(Array.isArray(cloud.children[child].rewards)&&cloud.children[child].rewards.length)state.children[child].rewards=cloud.children[child].rewards}})}saveState();render()}
function cloudRequest(action,params={}){if(!CLOUD_WEB_APP_URL)return Promise.resolve(null);return new Promise((resolve,reject)=>{const cb=`powerUpCallback_${Date.now()}_${Math.floor(Math.random()*1e5)}`;const script=document.createElement("script");const url=new URL(CLOUD_WEB_APP_URL);url.searchParams.set("action",action);url.searchParams.set("callback",cb);url.searchParams.set("date",todayKey());url.searchParams.set("_ts",String(Date.now()));Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v)));const timer=setTimeout(()=>{cleanup();reject(new Error("Cloud timeout"))},8000);window[cb]=data=>{cleanup();resolve(data)};script.onerror=()=>{cleanup();reject(new Error("Cloud failed"))};function cleanup(){clearTimeout(timer);delete window[cb];script.remove()}script.src=url.toString();document.body.appendChild(script)})}
function getNextReward(){return childRewards().find(r=>childState().points<r.points)}function getPreviousTier(nextPoints){const prev=childRewards().filter(r=>r.points<nextPoints).map(r=>r.points);return prev.length?Math.max(...prev):0}
function rolloverIfNeeded(){const today=todayKey();if(state.date!==today){state.date=today;Object.keys(state.children).forEach(c=>{state.children[c].points=0;state.children[c].log=[]});saveState()}}
function loadState(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));if(!saved)return structuredClone(defaultState);const merged=structuredClone(defaultState);Object.assign(merged,saved);merged.children={...structuredClone(defaultState.children),...(saved.children||{})};Object.keys(merged.children).forEach(child=>{merged.children[child].theme=merged.children[child].theme||CHILDREN[child].theme;merged.children[child].rewards=merged.children[child].rewards||CHILDREN[child].rewards;merged.children[child].log=Array.isArray(merged.children[child].log)?merged.children[child].log:[];merged.children[child].points=Number(merged.children[child].points||0)});return merged}catch(e){return structuredClone(defaultState)}}function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}function todayKey(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`}function formatToday(){return new Date().toLocaleDateString([],{weekday:"long",month:"short",day:"numeric"})}
